<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | eShop</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="home.html" class="brand">
            <span class="brand-icon">
                <img src="../assets/images/shop-icon.png" alt="eShop icon">
            </span>
            <span>eShop</span>
        </a>

        <div class="menu-wrapper">
            <button id="menuToggle" class="menu-toggle" type="button" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="mainMenu" class="main-menu">
                <div class="menu-user-box" id="menuUserBox">
                    <strong id="menuWelcomeName">Welcome, Guest</strong>
                    <small id="menuAccountRole">Guest account</small>
                </div>

                <a href="home.html">Home</a>
                <a href="cart.html" id="cartLink">
                    Cart <span id="cartBadge" class="cart-badge">0</span>
                </a>
                <a href="seller/dashboard.html" id="sellerDashboardLink" hidden>Seller Dashboard</a>
                <a href="profile.html" id="profileLink" hidden>Edit Profile</a>
                <a href="auth/login.html" id="loginLink">Login</a>
                <a href="auth/register.html" id="registerLink">Register</a>
                <button id="logoutBtn" class="menu-logout-btn" hidden>Logout</button>
            </nav>
        </div>
    </header>

    <main class="home-page">
        <section class="hero">
            <h2>Checkout</h2>
            <p id="userInfo">Checking session...</p>
        </section>

        <section class="checkout-section">
            <div class="checkout-layout">
                <div class="checkout-card">
                    <h3>Customer Details</h3>

                    <form id="checkoutForm">
                        <div class="form-group">
                            <label for="customerName">Full Name</label>
                            <input type="text" id="customerName" name="customer_name" required>
                        </div>

                        <div class="form-group">
                            <label for="customerEmail">Email</label>
                            <input type="email" id="customerEmail" name="customer_email" required>
                        </div>

                        <h3 class="form-section-title">Shipping Address</h3>

                        <div class="form-group">
                            <label for="streetAddress">Street Address</label>
                            <input type="text" id="streetAddress" name="street_address" placeholder="Example: 25 Ermou Street" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" placeholder="Example: Athens" required>
                            </div>

                            <div class="form-group">
                                <label for="postalCode">Postal Code</label>
                                <input type="text" id="postalCode" name="postal_code" placeholder="Example: 10563" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="country">Country</label>
                            <select id="country" name="country" required>
                                <option value="">Select country</option>
                                <option value="Greece">Greece</option>
                                <option value="Cyprus">Cyprus</option>
                                <option value="Germany">Germany</option>
                                <option value="France">France</option>
                                <option value="Italy">Italy</option>
                                <option value="Spain">Spain</option>
                                <option value="Netherlands">Netherlands</option>
                                <option value="United Kingdom">United Kingdom</option>
                                <option value="United States">United States</option>
                            </select>
                        </div>

                        <h3 class="form-section-title">Contact Phone</h3>

                        <div class="phone-row">
                            <div class="form-group phone-code-group">
                                <label for="phoneCode">Code</label>
                                <select id="phoneCode" name="phone_code" required>
                                    <option value="+30">🇬🇷 +30</option>
                                    <option value="+357">🇨🇾 +357</option>
                                    <option value="+49">🇩🇪 +49</option>
                                    <option value="+33">🇫🇷 +33</option>
                                    <option value="+39">🇮🇹 +39</option>
                                    <option value="+34">🇪🇸 +34</option>
                                    <option value="+31">🇳🇱 +31</option>
                                    <option value="+44">🇬🇧 +44</option>
                                    <option value="+1">🇺🇸 +1</option>
                                </select>
                            </div>

                            <div class="form-group phone-number-group">
                                <label for="phoneNumber">Phone Number</label>
                                <input type="tel" id="phoneNumber" name="phone_number" placeholder="Example: 6912345678" required>
                            </div>
                        </div>

                        <button type="submit" class="btn">Place Order</button>
                    </form>
                </div>

                <aside class="checkout-summary">
                    <h3>Order Summary</h3>

                    <div id="checkoutItems" class="checkout-items">
                        <p class="empty-state">Loading checkout...</p>
                    </div>

                    <div class="summary-row checkout-total-row">
                        <span>Total</span>
                        <strong id="checkoutTotal">€0.00</strong>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/checkout.js"></script>
</body>
</html>
