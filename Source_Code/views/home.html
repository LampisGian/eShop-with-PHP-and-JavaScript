<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | eShop</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="#" id="homeLink" class="brand">
            <span class="brand-icon">
                <img src="../assets/images/shop-icon.png" alt="eShop icon">
            </span>
            <span>eShop</span>
        </a>

        <div class="menu-wrapper">
            <button id="menuToggle" class="menu-toggle" type="button" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="mainMenu" class="main-menu">
                <div class="menu-user-box" id="menuUserBox">
                    <strong id="menuWelcomeName">Welcome, Guest</strong>
                    <small id="menuAccountRole">Guest account</small>
                </div>

                <a href="#" id="homeMenuLink">Home</a>
                <a href="cart.html" id="cartLink">
                    Cart <span id="cartBadge" class="cart-badge">0</span>
                </a>
                <a href="seller/dashboard.html" id="sellerDashboardLink" hidden>Seller Dashboard</a>
                <a href="profile.html" id="profileLink" hidden>Edit Profile</a>
                <a href="auth/login.html" id="loginLink">Login</a>
                <a href="auth/register.html" id="registerLink">Register</a>
                <button id="logoutBtn" class="menu-logout-btn" hidden>Logout</button>
            </nav>
        </div>
    </header>

    <main class="home-page">
        <section class="hero">
            <h2>Welcome to the eShop</h2>
            <p id="userInfo">Checking session...</p>
        </section>

        <section class="products-section">
            <div class="section-heading">
                <div>
                    <h2>Latest Products</h2>
                    <p>Browse the newest products uploaded by sellers.</p>
                </div>
            </div>

            <div id="homepageProducts" class="homepage-products-grid">
                <p class="empty-state">Loading products...</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/products.js"></script>
</body>
</html>
