<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | eShop</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="home.html" class="brand">
            <span class="brand-icon">
                <img src="../assets/images/shop-icon.png" alt="eShop icon">
            </span>
            <span>eShop</span>
        </a>

        <div class="menu-wrapper">
            <button id="menuToggle" class="menu-toggle" type="button" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="mainMenu" class="main-menu">
                <div class="menu-user-box" id="menuUserBox">
                    <strong id="menuWelcomeName">Welcome, Guest</strong>
                    <small id="menuAccountRole">Guest account</small>
                </div>

                <a href="home.html">Home</a>
                <a href="cart.html" id="cartLink">
                    Cart <span id="cartBadge" class="cart-badge">0</span>
                </a>
                <a href="seller/dashboard.html" id="sellerDashboardLink" hidden>Seller Dashboard</a>
                <a href="profile.html" id="profileLink" hidden>Edit Profile</a>
                <a href="auth/login.html" id="loginLink">Login</a>
                <a href="auth/register.html" id="registerLink">Register</a>
                <button id="logoutBtn" class="menu-logout-btn" hidden>Logout</button>
            </nav>
        </div>
    </header>

    <main class="home-page">
        <section class="hero">
            <h2>Your Cart</h2>
            <p id="userInfo">Checking session...</p>
        </section>

        <section class="cart-section">
            <div class="cart-layout">
                <div class="cart-card">
                    <h3>Cart Items</h3>
                    <div id="cartItems" class="cart-items">
                        <p class="empty-state">Loading cart...</p>
                    </div>
                </div>

                <aside class="cart-summary">
                    <h3>Order Summary</h3>

                    <div class="summary-row">
                        <span>Items</span>
                        <strong id="summaryItems">0</strong>
                    </div>

                    <div class="summary-row">
                        <span>Total</span>
                        <strong id="summaryTotal">€0.00</strong>
                    </div>

                    <button id="clearCartBtn" class="secondary-btn">Clear Cart</button>
                    <button id="checkoutBtn" class="btn">Continue to Checkout</button>
                </aside>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/cart.js"></script>
</body>
</html>
