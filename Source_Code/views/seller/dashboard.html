<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | eShop</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="../home.html" class="brand">
            <span class="brand-icon">
                <img src="../../assets/images/shop-icon.png" alt="eShop icon">
            </span>
            <span>eShop Seller</span>
        </a>

        <div class="menu-wrapper">
            <button id="menuToggle" class="menu-toggle" type="button" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="mainMenu" class="main-menu">
                <a href="../home.html">Home</a>
                <a href="#" id="sellerDashboardMenuLink">Seller Dashboard</a>
                <button id="logoutBtn" class="menu-logout-btn" hidden>Logout</button>
            </nav>
        </div>
    </header>

    <main class="dashboard-page">
        <section class="dashboard-hero">
            <div>
                <h2>Seller Dashboard</h2>
                <p id="sellerInfo">Checking seller session...</p>
            </div>
        </section>

        <section class="dashboard-grid">
            <div class="dashboard-card">
                <h3>Upload Product</h3>
                <p class="card-subtitle">Add a new product to your store.</p>

                <form id="productForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="title">Product Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" required></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Price (€)</label>
                            <input type="number" id="price" name="price" step="0.01" min="0.01" required>
                        </div>

                        <div class="form-group">
                            <label for="stock">Stock</label>
                            <input type="number" id="stock" name="stock" min="0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="category_id">Category</label>
                        <select id="category_id" name="category_id" required>
                            <option value="">Loading categories...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="image">Product Image</label>
                        <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/webp" required>
                        <small class="helper-text">Allowed: JPG, PNG, WEBP. Max size: 5MB.</small>
                    </div>

                    <button type="submit" class="btn">Upload Product</button>
                </form>
            </div>

            <div class="dashboard-card">
                <h3>My Products</h3>
                <p class="card-subtitle">Products uploaded by your seller account.</p>

                <div id="productsList" class="products-list">
                    <p class="empty-state">Loading products...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../assets/js/seller.js"></script>
</body>
</html>
